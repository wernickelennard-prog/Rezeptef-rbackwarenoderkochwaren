<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gourmet Finder Pro</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🍴</text></svg>">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="home-screen">
            <header>
                <div class="brand-logo"><i class="fas fa-utensils"></i></div>
                <h1>Gourmet Finder</h1>
                <p>Präzise Rezepte für Laptop & Handy</p>
            </header>

            <div class="main-selection">
                <div class="hero-card kochen" onclick="openApp('kochen')">
                    <div class="card-content">
                        <h2>Kochen</h2>
                        <p>Herzhafte Gerichte <i class="fas fa-arrow-right"></i></p>
                    </div>
                </div>
                <div class="hero-card backen" onclick="openApp('backen')">
                    <div class="card-content">
                        <h2>Backen</h2>
                        <p>Süße Meisterwerke <i class="fas fa-arrow-right"></i></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="app-screen" style="display: none;">
            <div class="top-bar">
                <button class="nav-circle-btn" onclick="goHome()"><i class="fas fa-house"></i></button>
                <h2 id="mode-title">Kochen</h2>
            </div>

            <div class="search-box">
                <div class="input-wrapper">
                    <label><i class="fas fa-basket-shopping"></i> Zutaten (z.B. Mehl, Eier...)</label>
                    <input type="text" id="zutaten" placeholder="Was hast du im Haus?" onkeydown="if(event.key==='Enter')suche(true)">
                </div>
                <div class="button-group">
                    <button class="btn-main" onclick="suche(true)"><i class="fas fa-magnifying-glass"></i> Finden</button>
                    <button class="btn-sub" onclick="suche(false)"><i class="fas fa-circle-xmark"></i> Ohne</button>
                </div>
            </div>

            <div id="results-container" class="results-area"></div>
        </div>
    </div>

    <div id="recipe-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <div id="vegan-toggle-btn" class="vegan-toggle" onclick="toggleVegan()">
                    <i class="fas fa-leaf"></i> <span id="toggle-text">Standard-Modus</span>
                </div>
                <span class="close-modal" onclick="closeModal()"><i class="fas fa-xmark"></i></span>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
